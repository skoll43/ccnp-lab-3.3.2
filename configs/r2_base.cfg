hostname R2
!
no ip domain-lookup
!
ipv6 unicast-routing
ipv6 cef
!
! VACL no bloquea trafico inter-VLAN en switches L2; se refuerza en router
ip access-list extended ACL_BLOCK_23_24
 deny ip 10.0.41.0 0.0.0.255 10.0.51.0 0.0.0.255
 deny ip 10.0.51.0 0.0.0.255 10.0.41.0 0.0.0.255
 permit ip any any
!
ipv6 access-list ACL6_BLOCK_23_24
 deny ipv6 3001:ABCD:ABCD:C::/64 3001:ABCD:ABCD:D::/64
 deny ipv6 3001:ABCD:ABCD:D::/64 3001:ABCD:ABCD:C::/64
 permit ipv6 any any
!
interface Loopback2
 ip address 2.2.2.2 255.255.255.255
 ipv6 address 3001:ABCD:ABCD:2::2/128
 ip ospf 1 area 0
 ipv6 ospf 1 area 0
!
interface Ethernet0/1
 ip address 192.168.12.2 255.255.255.0
 ipv6 address 3001:ABCD:ABCD:12::2/64
 ip ospf 1 area 0
 ipv6 ospf 1 area 0
 no shutdown
!
interface Ethernet0/3
 no ip address
 no shutdown
!
interface Ethernet0/3.21
 encapsulation dot1Q 21
 ip address 10.0.21.252 255.255.255.0
 ipv6 address 3001:ABCD:ABCD:A::252/64
 standby version 2
 standby 21 ip 10.0.21.254
 standby 21 priority 110
 standby 21 preempt
 standby 121 ipv6 3001:ABCD:ABCD:A::FF/64
 standby 121 priority 110
 standby 121 preempt
 ip ospf 1 area 100
 ipv6 ospf 1 area 100
 ipv6 nd managed-config-flag
 ipv6 nd other-config-flag
 ip helper-address 1.1.1.1
 ipv6 dhcp relay destination 3001:ABCD:ABCD:1::1
!
interface Ethernet0/3.22
 encapsulation dot1Q 22
 ip address 10.0.31.252 255.255.255.0
 ipv6 address 3001:ABCD:ABCD:B::252/64
 standby version 2
 standby 22 ip 10.0.31.254
 standby 22 priority 110
 standby 22 preempt
 standby 122 ipv6 3001:ABCD:ABCD:B::FF/64
 standby 122 priority 110
 standby 122 preempt
 ip ospf 1 area 100
 ipv6 ospf 1 area 100
 ipv6 nd managed-config-flag
 ipv6 nd other-config-flag
 ip helper-address 1.1.1.1
 ipv6 dhcp relay destination 3001:ABCD:ABCD:1::1
!
interface Ethernet0/3.23
 encapsulation dot1Q 23
 ip address 10.0.41.252 255.255.255.0
 ipv6 address 3001:ABCD:ABCD:C::252/64
 standby version 2
 standby 23 ip 10.0.41.254
 standby 23 priority 100
 standby 23 preempt
 standby 123 ipv6 3001:ABCD:ABCD:C::FF/64
 standby 123 priority 100
 standby 123 preempt
 ip ospf 1 area 100
 ipv6 ospf 1 area 100
 ipv6 nd managed-config-flag
 ipv6 nd other-config-flag
 ip helper-address 1.1.1.1
 ipv6 dhcp relay destination 3001:ABCD:ABCD:1::1
 ip access-group ACL_BLOCK_23_24 in
 ipv6 traffic-filter ACL6_BLOCK_23_24 in
!
interface Ethernet0/3.24
 encapsulation dot1Q 24
 ip address 10.0.51.252 255.255.255.0
 ipv6 address 3001:ABCD:ABCD:D::252/64
 standby version 2
 standby 24 ip 10.0.51.254
 standby 24 priority 100
 standby 24 preempt
 standby 124 ipv6 3001:ABCD:ABCD:D::FF/64
 standby 124 priority 100
 standby 124 preempt
 ip ospf 1 area 100
 ipv6 ospf 1 area 100
 ipv6 nd managed-config-flag
 ipv6 nd other-config-flag
 ip helper-address 1.1.1.1
 ipv6 dhcp relay destination 3001:ABCD:ABCD:1::1
 ip access-group ACL_BLOCK_23_24 in
 ipv6 traffic-filter ACL6_BLOCK_23_24 in
!
interface Ethernet0/3.25
 encapsulation dot1Q 25
 ip address 10.0.61.252 255.255.255.0
 ipv6 address 3001:ABCD:ABCD:E::252/64
 standby version 2
 standby 25 ip 10.0.61.254
 standby 25 priority 100
 standby 25 preempt
 standby 125 ipv6 3001:ABCD:ABCD:E::FF/64
 standby 125 priority 100
 standby 125 preempt
 ip ospf 1 area 100
 ipv6 ospf 1 area 100
 ipv6 nd managed-config-flag
 ipv6 nd other-config-flag
 ip helper-address 1.1.1.1
 ipv6 dhcp relay destination 3001:ABCD:ABCD:1::1
!
router ospf 1
 router-id 2.2.2.2
 passive-interface default
 no passive-interface Ethernet0/1
 no passive-interface Tunnel0
 network 2.2.2.2 0.0.0.0 area 0
 network 192.168.12.0 0.0.0.255 area 0
 area 100 range 10.0.0.0 255.248.0.0
 network 10.0.21.0 0.0.0.255 area 100
 network 10.0.31.0 0.0.0.255 area 100
 network 10.0.41.0 0.0.0.255 area 100
 network 10.0.51.0 0.0.0.255 area 100
 network 10.0.61.0 0.0.0.255 area 100
!
ipv6 router ospf 1
 router-id 2.2.2.2
 area 100 range 3001:ABCD:ABCD::/48
!
end

hsrp, vpn site to site, xcls, tunel gre, ip sla y track
