hostname R1
!
no ip domain-lookup
!
ipv6 unicast-routing
ipv6 cef
!
interface Loopback1
 ip address 1.1.1.1 255.255.255.255
 ipv6 address 3001:ABCD:ABCD:1::1/128
 ip ospf 1 area 0
 ipv6 ospf 1 area 0
!
interface Ethernet0/1
 ip address 192.168.12.1 255.255.255.0
 ipv6 address 3001:ABCD:ABCD:12::1/64
 ip ospf 1 area 0
 ipv6 ospf 1 area 0
 no shutdown
!
interface Ethernet0/2
 ip address 192.168.13.1 255.255.255.0
 ipv6 address 3001:ABCD:ABCD:13::1/64
 ip ospf 1 area 0
 ipv6 ospf 1 area 0
 no shutdown
!
interface Ethernet0/3
 ip address 209.50.0.1 255.255.255.252
 ipv6 address 3001:ABCD:ABCD:209::1/112
 no shutdown
!
ip dhcp pool VLAN21
 network 10.0.21.0 255.255.255.0
 default-router 10.0.21.254
 dns-server 8.8.8.8
 domain-name ary5112.lab
!
ip dhcp pool VLAN22
 network 10.0.31.0 255.255.255.0
 default-router 10.0.31.254
 dns-server 8.8.8.8
 domain-name ary5112.lab
!
ip dhcp pool VLAN23
 network 10.0.41.0 255.255.255.0
 default-router 10.0.41.254
 dns-server 8.8.8.8
 domain-name ary5112.lab
!
ip dhcp pool VLAN24
 network 10.0.51.0 255.255.255.0
 default-router 10.0.51.254
 dns-server 8.8.8.8
 domain-name ary5112.lab
!
ip dhcp pool VLAN25
 network 10.0.61.0 255.255.255.0
 default-router 10.0.61.254
 dns-server 8.8.8.8
 domain-name ary5112.lab
!
ip dhcp excluded-address 10.0.21.252 10.0.21.254
ip dhcp excluded-address 10.0.31.252 10.0.31.254
ip dhcp excluded-address 10.0.41.252 10.0.41.254
ip dhcp excluded-address 10.0.51.252 10.0.51.254
ip dhcp excluded-address 10.0.61.252 10.0.61.254
!
ipv6 dhcp pool VLAN21
 address prefix 3001:ABCD:ABCD:A::/64
 dns-server 3001:ABCD:ABCD:8:8::8
 domain-name ary5112.lab
!
ipv6 dhcp pool VLAN22
 address prefix 3001:ABCD:ABCD:B::/64
 dns-server 3001:ABCD:ABCD:8:8::8
 domain-name ary5112.lab
!
ipv6 dhcp pool VLAN23
 address prefix 3001:ABCD:ABCD:C::/64
 dns-server 3001:ABCD:ABCD:8:8::8
 domain-name ary5112.lab
!
ipv6 dhcp pool VLAN24
 address prefix 3001:ABCD:ABCD:D::/64
 dns-server 3001:ABCD:ABCD:8:8::8
 domain-name ary5112.lab
!
ipv6 dhcp pool VLAN25
 address prefix 3001:ABCD:ABCD:E::/64
 dns-server 3001:ABCD:ABCD:8:8::8
 domain-name ary5112.lab
!
router ospf 1
 router-id 1.1.1.1
 network 1.1.1.1 0.0.0.0 area 0
 network 192.168.12.0 0.0.0.255 area 0
 network 192.168.13.0 0.0.0.255 area 0
!
ipv6 router ospf 1
 router-id 1.1.1.1
!
end